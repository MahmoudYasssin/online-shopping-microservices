server:
  port: 3032

spring:
  application:
    name: "inventory-service"



  datasource:
    url: jdbc:mysql://localhost:3306/inventorydb
    username: root
    password: 30201022300911/*-+

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

  sql:
    init:
      mode: always
eureka:
#  instance:
 #   prefer-ip-address: true  # register in eureka server using ip address not using hostname
  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always